<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUANTUM SINGULARITY CORE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; cursor: none; }
        #ui { 
            position: absolute; top: 30px; left: 30px; color: #0ff; 
            pointer-events: none; z-index: 100; border-left: 2px solid #0ff; padding-left: 15px;
        }
        #overlay { 
            position: absolute; inset: 0; background: radial-gradient(circle, #111 0%, #000 100%); 
            display: flex; justify-content: center; align-items: center; 
            color: #0ff; z-index: 1000; cursor: pointer; text-align: center;
        }
        #controls { position: absolute; top: 30px; right: 30px; z-index: 101; }
        button { 
            background: transparent; border: 1px solid #0ff; color: #0ff; 
            padding: 8px 20px; cursor: pointer; text-transform: uppercase; font-family: inherit;
            transition: 0.3s;
        }
        button:hover { background: rgba(0,255,255,0.2); box-shadow: 0 0 15px #0ff; }
        .stat { font-size: 10px; letter-spacing: 2px; opacity: 0.6; margin-top: 10px; }
        .val { font-size: 22px; font-weight: bold; text-shadow: 0 0 10px #0ff; }
        video { display: none; }
    </style>
</head>
<body>
    <div id="overlay" onclick="startSystem()">
        <div>
            <h1 style="letter-spacing: 15px;">SINGULARITY</h1>
            <p>[ CLICK TO INITIALIZE NEURAL INTERFACE ]</p>
        </div>
    </div>
    
    <div id="ui">
        <div class="stat">CONTAINMENT</div>
        <div id="core-state" class="val">OFFLINE</div>
        <div class="stat">CRITICALITY</div>
        <div id="energy-val" class="val">0%</div>
    </div>

    <div id="controls">
        <button id="mute-btn" onclick="toggleMute()">AUDIO: ON</button>
    </div>

    <video id="webcam"></video>

<script>
let particles = [];
let handOpenness = 0;
let prevOpenness = 0;
let isSupernova = false; 
let isMuted = false;
let audioInit = false;
let synth, noiseSynth, filter;

// MediaPipe Setup
const video = document.getElementById('webcam');
const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7 });

hands.onResults((res) => {
    if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
        let lm = res.multiHandLandmarks[0];
        // Calculate openness: Thumb tip (4) to Pinky tip (20)
        let d = dist(lm[4].x, lm[4].y, lm[20].x, lm[20].y);
        prevOpenness = handOpenness;
        handOpenness = lerp(handOpenness, constrain(map(d, 0.05, 0.25, 0, 1), 0, 1), 0.2);

        // TRIGGER SUPERNOVA: Sudden fast opening
        if (handOpenness - prevOpenness > 0.18) isSupernova = true;
        
        // RE-CONTAIN: Close fist to stop supernova
        if (handOpenness < 0.12 && isSupernova) isSupernova = false;

        if(audioInit && !isMuted) updateAudio();
    } else {
        handOpenness = lerp(handOpenness, 0, 0.02);
    }
    updateUI();
});

new Camera(video, { onFrame: async () => { await hands.send({image: video}); }, width: 640, height: 480 }).start();

function startSystem() {
    Tone.start();
    synth = new Tone.FatOscillator("C2", "sawtooth", 12).toDestination().start();
    filter = new Tone.Filter(200, "lowpass").toDestination();
    noiseSynth = new Tone.Noise("pink").connect(filter).start();
    synth.volume.value = -20;
    noiseSynth.volume.value = -40;
    audioInit = true;
    document.getElementById('overlay').style.display = 'none';
}

function toggleMute() {
    isMuted = !isMuted;
    document.getElementById('mute-btn').innerText = isMuted ? "AUDIO: OFF" : "AUDIO: ON";
    if (isMuted) { synth.volume.rampTo(-100, 0.1); noiseSynth.volume.rampTo(-100, 0.1); }
    else { synth.volume.rampTo(-20, 0.2); }
}

function updateUI() {
    let energy = Math.floor(handOpenness * 100);
    document.getElementById('energy-val').innerText = `${energy}%`;
    const el = document.getElementById('core-state');
    
    if (isSupernova) {
        el.innerText = "SUPERNOVA"; el.style.color = "#fff";
    } else {
        el.innerText = energy > 85 ? "CRITICAL" : "STABLE";
        el.style.color = energy > 85 ? "#f0f" : "#0ff";
    }
}

function updateAudio() {
    let freq = isSupernova ? 80 : 40;
    synth.frequency.rampTo(freq + (handOpenness * 120), 0.1);
    filter.frequency.value = 100 + (handOpenness * 1500) + (isSupernova ? 4000 : 0);
}

// P5.js Simulation
function setup() {
    createCanvas(windowWidth, windowHeight, WEBGL);
    for (let i = 0; i < 1500; i++) particles.push(new Particle());
}

function draw() {
    background(0);
    
    // Smooth cinematic rotation
    rotateY(frameCount * 0.005);
    rotateX(frameCount * 0.002);

    // Dynamic Core Light
    pointLight(255, 255, 255, 0, 0, 0);

    particles.forEach(p => {
        p.update();
        p.show();
    });
}

class Particle {
    constructor() {
        this.pos = p5.Vector.random3D().mult(random(10, 500));
        this.vel = p5.Vector.random3D();
        this.acc = createVector(0,0,0);
        this.noiseOffset = random(1000);
    }

    update() {
        let d = this.pos.mag();

        if (isSupernova) {
            // FLUID FLOW MODE
            let n = noise(this.pos.x * 0.005, this.pos.y * 0.005, frameCount * 0.02 + this.noiseOffset);
            let flow = p5.Vector.fromAngle(n * TWO_PI * 2);
            this.acc.add(flow.mult(0.5));
            this.vel.limit(15);
            // Slight pull to prevent escaping forever
            if (d > 800) this.acc.add(this.pos.copy().mult(-0.001));
        } else {
            // ATOM MODE (Containment)
            let targetR = map(handOpenness, 0, 1, 60, 400);
            let force = (d - targetR) * -0.02;
            let steer = this.pos.copy().normalize().mult(force);
            this.acc.add(steer);
            
            // Jitter at critical mass
            if (handOpenness > 0.85) {
                this.acc.add(p5.Vector.random3D().mult(handOpenness * 3));
            }
            this.vel.limit(isSupernova ? 30 : 15);
        }

        this.vel.add(this.acc);
        this.pos.add(this.vel);
        this.acc.mult(0);
        this.vel.mult(0.96); // Drag
    }

    show() {
        push();
        translate(this.pos.x, this.pos.y, this.pos.z);
        
        let r, g, b;
        if (isSupernova) {
            // Flickering Star Energy
            r = random(150, 255); g = 255; b = 255;
        } else {
            // Critical Mass Color Shift
            r = map(handOpenness, 0.7, 1, 0, 255);
            g = map(handOpenness, 0, 1, 255, 50);
            b = 255;
        }
        
        stroke(r, g, b, 200);
        strokeWeight(isSupernova ? random(2, 6) : map(handOpenness, 0, 1, 2, 5));
        point(0, 0, 0);
        pop();
    }
}

function windowResized() { resizeCanvas(windowWidth, windowHeight); }
</script>
</body>
</html>
