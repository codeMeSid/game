<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SINGULARITY: FLUID CRITICALITY</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; cursor: none; }
        #overlay { 
            position: absolute; inset: 0; background: radial-gradient(circle, #111 0%, #000 100%); 
            display: flex; justify-content: center; align-items: center; 
            color: #0ff; z-index: 1000; cursor: pointer; text-align: center;
        }
        #ui { position: absolute; top: 30px; left: 30px; color: #0ff; pointer-events: none; z-index: 100; border-left: 2px solid #0ff; padding-left: 15px; }
        #controls { position: absolute; top: 30px; right: 30px; z-index: 101; }
        button { 
            background: transparent; border: 1px solid #0ff; color: #0ff; 
            padding: 8px 20px; cursor: pointer; text-transform: uppercase; font-family: inherit;
            transition: all 0.3s;
        }
        button:hover { background: rgba(0,255,255,0.2); box-shadow: 0 0 15px #0ff; }
        video { display: none; }
        .label { font-size: 9px; letter-spacing: 2px; opacity: 0.7; }
        .value { font-size: 20px; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="overlay" onclick="startSystem()">
        <div>
            <h1 style="letter-spacing: 15px; text-shadow: 0 0 20px #0ff;">SINGULARITY</h1>
            <p>[ CLICK TO LINK NEURAL INTERFACE ]</p>
        </div>
    </div>
    
    <div id="ui">
        <div class="label">CONTAINMENT STATUS</div>
        <div id="core-state" class="value">STABLE</div>
        <div class="label">ENERGY LEVELS</div>
        <div id="energy-val" class="value">0%</div>
    </div>

    <div id="controls">
        <button id="mute-btn" onclick="toggleMute()">AUDIO: ENABLED</button>
    </div>

    <video id="webcam"></video>

<script>
let particles = [];
let handLandmarks = null;
let handOpenness = 0;
let prevOpenness = 0;
let explosionPower = 0;
let isMuted = false;
let audioInit = false;
let synth, noiseSynth, filter;

// --- MEDIAPIPE (Corrected Mapping) ---
const video = document.getElementById('webcam');
const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7 });

hands.onResults((res) => {
    if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
        handLandmarks = res.multiHandLandmarks[0];
        
        let d = dist(handLandmarks[4].x, handLandmarks[4].y, handLandmarks[20].x, handLandmarks[20].y);
        prevOpenness = handOpenness;
        // Sensitivity for openness
        handOpenness = lerp(handOpenness, constrain(map(d, 0.05, 0.25, 0, 1), 0, 1), 0.3);

        // Explosion Trigger: High-speed palm opening
        if (handOpenness - prevOpenness > 0.15) {
            explosionPower = 1.0;
        }

        if(audioInit && !isMuted) updateAudio();
    } else {
        handLandmarks = null;
        handOpenness = lerp(handOpenness, 0, 0.02);
    }
    updateUI();
});

new Camera(video, { onFrame: async () => { await hands.send({image: video}); }, width: 640, height: 480 }).start();

// --- AUDIO ---
function startSystem() {
    Tone.start();
    synth = new Tone.FatOscillator("C2", "sawtooth", 15).toDestination().start();
    filter = new Tone.Filter(200, "lowpass").toDestination();
    noiseSynth = new Tone.Noise("pink").connect(filter).start();
    
    synth.volume.value = -20;
    noiseSynth.volume.value = -35;
    
    audioInit = true;
    document.getElementById('overlay').style.display = 'none';
}

function toggleMute() {
    isMuted = !isMuted;
    document.getElementById('mute-btn').innerText = isMuted ? "AUDIO: MUTED" : "AUDIO: ENABLED";
    if (isMuted) {
        synth.volume.rampTo(-100, 0.1);
        noiseSynth.volume.rampTo(-100, 0.1);
    } else {
        synth.volume.rampTo(-20, 0.5);
    }
}

function updateUI() {
    let energy = Math.floor(handOpenness * 100);
    document.getElementById('energy-val').innerText = `${energy}%`;
    
    let state = "STABLE FLOW";
    let col = "#0ff";
    
    if (!handLandmarks) {
        state = "PASSIVE DRIFT"; col = "#555";
    } else if (explosionPower > 0.4) {
        state = "SUPERNOVA"; col = "#fff";
    } else if (energy > 85) {
        state = "CRITICAL MASS"; col = "#f0f";
    } else if (energy > 40) {
        state = "UNSTABLE"; col = "#0f0";
    }
    
    const el = document.getElementById('core-state');
    el.innerText = state;
    el.style.color = col;
}

function updateAudio() {
    synth.frequency.rampTo(40 + (handOpenness * 120), 0.1);
    filter.frequency.value = 100 + (handOpenness * 2000) + (explosionPower * 4000);
}

// --- P5.JS ---
function setup() {
    createCanvas(windowWidth, windowHeight, WEBGL);
    for (let i = 0; i < 1500; i++) particles.push(new Particle());
}

function draw() {
    background(0);
    
    // Smooth Orbit
    rotateY(frameCount * 0.005);
    rotateX(frameCount * 0.002);

    // Hand Visualizer (Fixed Coordinates)
    if (handLandmarks) {
        push();
        translate(0, 0, 150); 
        stroke(255, 40); // Faint glow
        strokeWeight(3);
        handLandmarks.forEach(p => {
            // Mirror X and Flip Y for WEBGL center-origin
            let x = (0.5 - p.x) * width;
            let y = (p.y - 0.5) * -height; 
            point(x, y, 0);
        });
        pop();
    }

    // Process Dynamics
    particles.forEach(p => {
        p.update();
        p.show();
    });

    if (explosionPower > 0) explosionPower *= 0.94; // Fade out blast
}

class Particle {
    constructor() {
        this.pos = p5.Vector.random3D().mult(random(200, 500));
        this.vel = p5.Vector.random3D();
        this.acc = createVector(0,0,0);
        this.noiseOffset = random(1000);
    }

    update() {
        if (!handLandmarks && explosionPower < 0.1) {
            // PASSIVE FLUID MOTION: Perlin noise flow field
            let nX = noise(this.pos.x * 0.005, frameCount * 0.01 + this.noiseOffset);
            let nY = noise(this.pos.y * 0.005, frameCount * 0.01 + this.noiseOffset);
            let nZ = noise(this.pos.z * 0.005, frameCount * 0.01 + this.noiseOffset);
            this.acc.add(createVector(nX-0.5, nY-0.5, nZ-0.5).mult(0.1));
            this.vel.limit(2);
        } else {
            // ACTIVE CORE MODE
            let d = this.pos.mag();
            let targetR = map(handOpenness, 0, 1, 60, 400);
            
            // The Explosion Pulse
            if (explosionPower > 0.05) {
                targetR += explosionPower * 1200; // Forcefully expand the sphere target
                this.vel.add(this.pos.copy().normalize().mult(explosionPower * 20)); // Radial blast
            }

            // Gravity / Attraction to the core radius
            let strength = explosionPower > 0.1 ? 0.05 : 0.02;
            let force = (d - targetR) * -strength;
            let steer = this.pos.copy().normalize().mult(force);
            this.acc.add(steer);
            
            // Jitter at critical mass
            if (handOpenness > 0.8) {
                this.acc.add(p5.Vector.random3D().mult(handOpenness * 2));
            }
            
            this.vel.limit(explosionPower > 0.1 ? 50 : 20);
        }

        this.vel.add(this.acc);
        this.pos.add(this.vel);
        this.acc.mult(0);
        this.vel.mult(0.95); // Friction/Viscosity
    }

    show() {
        push();
        translate(this.pos.x, this.pos.y, this.pos.z);
        
        // Color Physics
        let energyFactor = handOpenness + (explosionPower * 2);
        let r = map(energyFactor, 0.7, 1.5, 0, 255);
        let g = map(handOpenness, 0, 1, 255, 50);
        let b = 255;
        
        if (explosionPower > 0.6) { r=255; g=255; b=255; } // Flash White
        
        stroke(r, g, b, 200);
        strokeWeight(map(handOpenness, 0, 1, 2, 5) + (explosionPower * 10));
        point(0, 0, 0);
        pop();
    }
}

function windowResized() { resizeCanvas(windowWidth, windowHeight); }
</script>
</body>
</html>
