<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SINGULARITY APEX</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; cursor: none; }
        #ui { 
            position: absolute; top: 40px; left: 40px; color: #0ff; 
            pointer-events: none; z-index: 100; border-left: 3px solid #0ff; padding-left: 20px;
        }
        #overlay { 
            position: absolute; inset: 0; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); 
            display: flex; justify-content: center; align-items: center; 
            color: #0ff; z-index: 1000; cursor: pointer; text-align: center;
        }
        #controls { position: absolute; top: 40px; right: 40px; z-index: 101; }
        button { 
            background: transparent; border: 1px solid #0ff; color: #0ff; 
            padding: 10px 25px; cursor: pointer; text-transform: uppercase; font-family: inherit;
            transition: 0.4s; letter-spacing: 2px;
        }
        button:hover { background: rgba(0,255,255,0.2); box-shadow: 0 0 20px #0ff; }
        .stat { font-size: 11px; letter-spacing: 3px; opacity: 0.5; margin-top: 15px; }
        .val { font-size: 26px; font-weight: bold; text-shadow: 0 0 15px #0ff; }
        video { display: none; }
    </style>
</head>
<body>
    <div id="overlay" onclick="startSystem()">
        <div>
            <h1 style="letter-spacing: 20px; margin-bottom: 10px;">APEX CORE</h1>
            <p style="opacity: 0.6;">[ TAP TO SYNC NEURAL LINK ]</p>
        </div>
    </div>
    
    <div id="ui">
        <div class="stat">REACTOR STATUS</div>
        <div id="core-state" class="val">OFFLINE</div>
        <div class="stat">THERMAL LOAD</div>
        <div id="energy-val" class="val">0%</div>
    </div>

    <div id="controls">
        <button id="mute-btn" onclick="toggleMute()">SONICS: ON</button>
    </div>

    <video id="webcam"></video>

<script>
let particles = [];
let stars = [];
let handOpenness = 0;
let prevOpenness = 0;
let isSupernova = false; 
let isMuted = false;
let audioInit = false;
let synth, noiseSynth, filter, lfo;

// MediaPipe Setup
const video = document.getElementById('webcam');
const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.75 });

hands.onResults((res) => {
    if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
        let lm = res.multiHandLandmarks[0];
        let d = dist(lm[4].x, lm[4].y, lm[20].x, lm[20].y);
        prevOpenness = handOpenness;
        handOpenness = lerp(handOpenness, constrain(map(d, 0.05, 0.28, 0, 1), 0, 1), 0.25);

        // PRESERVED: Supernova Snap Logic
        if (handOpenness - prevOpenness > 0.18) isSupernova = true;
        
        // PRESERVED: Containment Logic
        if (handOpenness < 0.12 && isSupernova) isSupernova = false;

        if(audioInit && !isMuted) updateAudio();
    } else {
        handOpenness = lerp(handOpenness, 0, 0.02);
    }
    updateUI();
});

new Camera(video, { onFrame: async () => { await hands.send({image: video}); }, width: 640, height: 480 }).start();

function startSystem() {
    Tone.start();
    synth = new Tone.FatOscillator("C1", "sawtooth", 20).toDestination().start();
    filter = new Tone.Filter(150, "lowpass").toDestination();
    noiseSynth = new Tone.Noise("brown").connect(filter).start();
    
    // Add a pulsing effect to the audio
    lfo = new Tone.LFO("4n", -30, -10).connect(synth.volume).start();
    
    synth.volume.value = -20;
    noiseSynth.volume.value = -45;
    audioInit = true;
    document.getElementById('overlay').style.display = 'none';
}

function toggleMute() {
    isMuted = !isMuted;
    document.getElementById('mute-btn').innerText = isMuted ? "SONICS: OFF" : "SONICS: ON";
    if (isMuted) { synth.volume.rampTo(-100, 0.2); noiseSynth.volume.rampTo(-100, 0.2); }
    else { synth.volume.rampTo(-20, 0.5); }
}

function updateUI() {
    let energy = Math.floor(handOpenness * 100);
    document.getElementById('energy-val').innerText = `${energy}%`;
    const el = document.getElementById('core-state');
    
    if (isSupernova) {
        el.innerText = "SUPERNOVA"; el.style.color = "#fff";
        el.style.textShadow = "0 0 20px #fff";
    } else {
        el.innerText = energy > 85 ? "CRITICAL" : "STABLE";
        el.style.color = energy > 85 ? "#f0f" : "#0ff";
        el.style.textShadow = energy > 85 ? "0 0 20px #f0f" : "0 0 20px #0ff";
    }
}

function updateAudio() {
    let freq = isSupernova ? 60 : 35;
    synth.frequency.rampTo(freq + (handOpenness * 150), 0.1);
    filter.frequency.value = 80 + (handOpenness * 2000) + (isSupernova ? 5000 : 0);
    lfo.frequency.value = map(handOpenness, 0, 1, 1, 15);
}

function setup() {
    createCanvas(windowWidth, windowHeight, WEBGL);
    for (let i = 0; i < 1600; i++) particles.push(new Particle());
    for (let i = 0; i < 400; i++) stars.push(p5.Vector.random3D().mult(random(1000, 2000)));
}

function draw() {
    background(0);
    
    // Smooth Orbit View
    rotateY(frameCount * 0.004);
    rotateX(frameCount * 0.0015);

    // Draw Background Starfield
    stroke(255, 150);
    strokeWeight(1);
    stars.forEach(s => point(s.x, s.y, s.z));

    // Dynamic Lighting
    ambientLight(20);
    pointLight(255, 255, 255, 0, 0, 0);

    particles.forEach(p => {
        p.update();
        p.show();
    });
}

class Particle {
    constructor() {
        this.pos = p5.Vector.random3D().mult(random(20, 400));
        this.vel = p5.Vector.random3D();
        this.acc = createVector(0,0,0);
        this.noiseOffset = random(2000);
        this.size = random(2, 5);
    }

    update() {
        let d = this.pos.mag();

        if (isSupernova) {
            // FLUID SUPERNOVA MOTION
            let n = noise(this.pos.x * 0.004, this.pos.y * 0.004, frameCount * 0.015 + this.noiseOffset);
            let flow = p5.Vector.fromAngle(n * TWO_PI * 3);
            this.acc.add(flow.mult(0.6));
            this.vel.limit(18);
            if (d > 900) this.acc.add(this.pos.copy().mult(-0.002));
        } else {
            // ATOM CONTAINMENT MODE
            let targetR = map(handOpenness, 0, 1, 70, 420);
            let force = (d - targetR) * -0.025;
            let steer = this.pos.copy().normalize().mult(force);
            this.acc.add(steer);
            
            // Jitter and "Boiling" effect
            if (handOpenness > 0.8) {
                this.acc.add(p5.Vector.random3D().mult(handOpenness * 4));
            }
            this.vel.limit(isSupernova ? 35 : 18);
        }

        this.vel.add(this.acc);
        this.pos.add(this.vel);
        this.acc.mult(0);
        this.vel.mult(0.95);
    }

    show() {
        push();
        translate(this.pos.x, this.pos.y, this.pos.z);
        
        let r, g, b;
        if (isSupernova) {
            r = random(180, 255); g = 255; b = 255;
        } else {
            r = map(handOpenness, 0.7, 1, 0, 255);
            g = map(handOpenness, 0, 1, 255, 100);
            b = 255;
        }
        
        // Critical mass RGB split effect
        if (handOpenness > 0.92 || isSupernova) {
            stroke(255, 0, 100, 150);
            point(random(-2,2), random(-2,2), random(-2,2));
        }
        
        stroke(r, g, b, 200);
        strokeWeight(isSupernova ? random(2, 7) : map(handOpenness, 0, 1, 2, 6));
        point(0, 0, 0);
        pop();
    }
}

function windowResized() { resizeCanvas(windowWidth, windowHeight); }
</script>
</body>
</html>
