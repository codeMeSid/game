<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realistic Gesture Warp Drive</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: #000; font-family: 'Courier New', Courier, monospace;
        }
        #ui {
            position: absolute; top: 20px; left: 20px;
            color: #00FFFF; z-index: 10; pointer-events: none;
            background: rgba(0, 10, 20, 0.7); padding: 15px;
            border-radius: 8px; border: 1px solid #00FFFF;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }
        h1 { margin: 0 0 10px 0; font-size: 1.2rem; text-transform: uppercase; }
        p { margin: 5px 0; font-size: 0.9rem; }
        .highlight { color: #FF0055; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui">
        <h1>Navigation Computer</h1>
        <p id="status">Status: Initializing MediaPipe...</p>
        <p>Instructions:</p>
        <p>- No hands = Dead stop</p>
        <p>- Hands visible = Idle cruise</p>
        <p>- TWO Fists = <span class="highlight">ENGAGE WARP</span> (Move closer to accelerate)</p>
        <p id="speed-display">Velocity: 0.0c</p>
    </div>

    <script type="module">
        import { GestureRecognizer, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        let gestureRecognizer;
        let video;
        let stars = [];
        let currentSpeed = 0;
        let targetSpeed = 0;
        let modelLoaded = false;
        let lastVideoTime = -1;
        let gestureResults = undefined;

        // Constants for speed
        const IDLE_SPEED = 2;
        const MAX_SPEED = 120;

        // Make p5 functions global so the module can see them
        window.setup = function() {
            createCanvas(windowWidth, windowHeight, WEBGL);
            
            // Setup Video
            video = createCapture(VIDEO);
            video.size(640, 480);
            video.hide();
            
            // Generate Particle System
            for (let i = 0; i < 1200; i++) {
                stars.push(new Star());
            }

            // Initialize MediaPipe
            initMediaPipe();
        };

        async function initMediaPipe() {
            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
            );
            gestureRecognizer = await GestureRecognizer.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task",
                    delegate: "GPU" // Use hardware acceleration
                },
                runningMode: "VIDEO",
                numHands: 2
            });
            modelLoaded = true;
            document.getElementById('status').innerText = "Status: Sensors Online. Awaiting input.";
        }

        window.draw = function() {
            background(0, 2, 8); // Very dark blue/black space
            
            // 1. Process Video Frame through MediaPipe
            if (modelLoaded && video.loadedmetadata) {
                if (video.elt.currentTime !== lastVideoTime) {
                    lastVideoTime = video.elt.currentTime;
                    gestureResults = gestureRecognizer.recognizeForVideo(video.elt, performance.now());
                }
            }

            // 2. Logic: Speed Control based on Hands
            if (gestureResults && gestureResults.landmarks.length > 0) {
                let handsCount = gestureResults.landmarks.length;
                
                if (handsCount >= 2) {
                    let gesture1 = gestureResults.gestures[0][0].categoryName;
                    let gesture2 = gestureResults.gestures[1][0].categoryName;

                    if (gesture1 === "Closed_Fist" && gesture2 === "Closed_Fist") {
                        // WARP SPEED: Calculate hand size (distance to screen)
                        let hand1 = gestureResults.landmarks[0];
                        let hand2 = gestureResults.landmarks[1];
                        
                        // Width of bounding box
                        let w1 = Math.max(...hand1.map(p => p.x)) - Math.min(...hand1.map(p => p.x));
                        let w2 = Math.max(...hand2.map(p => p.x)) - Math.min(...hand2.map(p => p.x));
                        let avgSize = (w1 + w2) / 2; // Usually between 0.1 and 0.5 in normalized coords
                        
                        targetSpeed = map(avgSize, 0.1, 0.4, IDLE_SPEED * 5, MAX_SPEED);
                        targetSpeed = constrain(targetSpeed, IDLE_SPEED, MAX_SPEED);
                        
                        document.getElementById('status').innerText = "Status: WARP DRIVE ACTIVE";
                        document.getElementById('status').style.color = "#FF0055";
                    } else {
                        // Hands visible, but not double fists
                        targetSpeed = IDLE_SPEED;
                        document.getElementById('status').innerText = "Status: Cruising...";
                        document.getElementById('status').style.color = "#00FFFF";
                    }
                } else {
                    // Only 1 hand visible
                    targetSpeed = IDLE_SPEED;
                    document.getElementById('status').innerText = "Status: 2 Fists required for Warp.";
                    document.getElementById('status').style.color = "#FFFF00";
                }
            } else {
                // NO HANDS DETECTED
                targetSpeed = 0;
                if (modelLoaded) {
                    document.getElementById('status').innerText = "Status: Standby (No hands detected)";
                    document.getElementById('status').style.color = "#888888";
                }
            }

            // Smooth acceleration / deceleration
            currentSpeed = lerp(currentSpeed, targetSpeed, 0.08);
            document.getElementById('speed-display').innerText = `Velocity: ${(currentSpeed).toFixed(1)}c`;

            // 3. Render Particles
            // Move origin slightly so we are flying "through" the center
            for (let star of stars) {
                star.update(currentSpeed);
                star.show(currentSpeed);
            }
        };

        window.windowResized = function() {
            resizeCanvas(windowWidth, windowHeight);
        };

        // --- Particle System Class ---
        class Star {
            constructor() {
                this.x = random(-width, width);
                this.y = random(-height, height);
                this.z = random(-width * 2, width); // Z-depth
                this.pz = this.z; // Previous Z (used for stretching lines)
                
                // Colors: Mix of whites, light blues, and cyans for a sci-fi glow
                this.r = random(150, 255);
                this.g = random(200, 255);
                this.b = 255;
                this.alpha = random(100, 255);
                this.weight = random(0.5, 3);
            }

            update(speed) {
                this.pz = this.z;
                this.z += speed; // Move particle toward camera

                // If particle passes the camera or speed drops to 0 while close
                if (this.z > width * 0.5) {
                    this.z = random(-width * 2, -width);
                    this.pz = this.z;
                    this.x = random(-width, width);
                    this.y = random(-height, height);
                }
            }

            show(speed) {
                // If we aren't moving, don't draw stretched streaks, just points
                let stretchLimit = speed > 1 ? this.pz : this.z - 2;

                stroke(this.r, this.g, this.b, this.alpha);
                strokeWeight(this.weight);
                
                // Draw a line from the current position to the previous position
                // This creates the motion blur/warp streak naturally
                line(this.x, this.y, this.z, this.x, this.y, stretchLimit);
            }
        }
    </script>
</body>
</html>
