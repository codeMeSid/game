<!doctype html>
<html>
  <head>
    <title>Gesture Canvas: Precision Tracking</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #020202;
        font-family: "Inter", sans-serif;
        color: white;
      }
      canvas {
        position: absolute;
        top: 0;
        left: 0;
      }
      #ui {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 100;
        background: rgba(10, 10, 10, 0.8);
        padding: 15px;
        border-radius: 12px;
        border: 1px solid #333;
        pointer-events: none;
      }
      #minimap-container {
        position: absolute;
        bottom: 20px;
        right: 20px;
        width: 200px;
        height: 112px;
        border: 1px solid #444;
        border-radius: 4px;
        overflow: hidden;
        background: #000;
        z-index: 100;
      }
      #minimap-video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: scaleX(-1);
        opacity: 0.3;
      }
      #minimap-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
      .key {
        color: #ffaa00;
        font-weight: bold;
      }
      video#input_video {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="ui">
      <div style="font-size: 1.1em; margin-bottom: 8px">
        ⚡ <strong>Precision Arc Welder</strong>
      </div>
      <div><span class="key">☝️ Index Only:</span> Weld</div>
      <div><span class="key">👌 Pinch:</span> Move Content</div>
      <div><span class="key">🖐️ Full Palm:</span> Erase Area</div>
      <div
        id="status"
        style="margin-top: 10px; font-size: 0.8em; color: #ffcc00"
      >
        Ready
      </div>
    </div>

    <div id="minimap-container">
      <video id="minimap-video" autoplay playsinline></video>
      <canvas id="minimap-overlay"></canvas>
    </div>

    <video id="input_video"></video>
    <canvas id="output_canvas"></canvas>

    <script>
      const videoElement = document.getElementById("input_video");
      const miniVideo = document.getElementById("minimap-video");
      const canvasElement = document.getElementById("output_canvas");
      const canvasCtx = canvasElement.getContext("2d");
      const miniCanvas = document.getElementById("minimap-overlay");
      const miniCtx = miniCanvas.getContext("2d");
      const statusText = document.getElementById("status");

      let particles = [];
      let lastPos = null;
      let isPinching = false;
      let lastPinchPos = { x: 0, y: 0 };
      let currentGesture = "IDLE";
      let gestureTimer = 0;

      function resize() {
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;
        miniCanvas.width = 200;
        miniCanvas.height = 112;
      }
      window.addEventListener("resize", resize);
      resize();

      class Spark {
        constructor(x, y, isStatic = false) {
          this.x = x;
          this.y = y;
          this.isStatic = isStatic;
          const angle = Math.random() * Math.PI * 2;
          const force = Math.random() * 6 + 2;
          this.vx = Math.cos(angle) * force;
          this.vy = Math.sin(angle) * force;
          this.life = 1.0;
          this.decay = Math.random() * 0.05 + 0.02;
          this.size = isStatic ? 2.5 : Math.random() * 2 + 1;
          this.hue = isStatic ? 40 : Math.random() * 20 + 30;
        }
        update() {
          if (!this.isStatic) {
            this.x += this.vx;
            this.y += this.vy;
            this.vy += 0.25;
            this.life -= this.decay;
          }
        }
        draw(ctx, scale = 1) {
          const alpha = this.isStatic ? 0.9 : this.life;
          if (alpha <= 0) return;
          ctx.fillStyle = `hsla(${this.hue}, 100%, 70%, ${alpha})`;
          if (this.isStatic) {
            ctx.shadowBlur = 8;
            ctx.shadowColor = `hsl(${this.hue}, 100%, 50%)`;
          }
          ctx.beginPath();
          ctx.arc(
            this.x * scale,
            this.y * scale,
            this.size * scale,
            0,
            Math.PI * 2,
          );
          ctx.fill();
          ctx.shadowBlur = 0;
        }
      }

      function addLineOfSparks(p1, p2) {
        const dist = Math.hypot(p2.x - p1.x, p2.y - p1.y);
        const steps = Math.max(1, Math.floor(dist / 3));
        for (let i = 0; i <= steps; i++) {
          const x = p1.x + (p2.x - p1.x) * (i / steps);
          const y = p1.y + (p2.y - p1.y) * (i / steps);
          particles.push(new Spark(x, y, true));
          if (Math.random() > 0.8) {
            for (let j = 0; j < 3; j++) particles.push(new Spark(x, y, false));
          }
        }
      }

      function onResults(results) {
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        miniCtx.clearRect(0, 0, miniCanvas.width, miniCanvas.height);

        if (
          results.multiHandLandmarks &&
          results.multiHandLandmarks.length > 0
        ) {
          const lm = results.multiHandLandmarks[0]; // Raw landmarks

          // Helper to get screen coordinates (Mirrored)
          const getPoint = (id) => ({
            x: (1 - lm[id].x) * canvasElement.width,
            y: lm[id].y * canvasElement.height,
          });

          const indexTip = getPoint(8);
          const thumbTip = getPoint(4);
          const palmCenter = getPoint(9);

          // --- ROBUST GESTURE MATH ---

          // 1. PINCH: Calculate using 3D normalized coordinates (ignores screen size)
          // We include 'z' to account for hand depth towards the camera
          const pinchDistance = Math.hypot(
            lm[8].x - lm[4].x,
            lm[8].y - lm[4].y,
            lm[8].z - lm[4].z,
          );
          const isPinchingGesture = pinchDistance < 0.06; // 0.06 is a very reliable threshold

          // 2. FINGER STATE EVALUATION
          // A finger is "open" if its tip is further from the wrist than its knuckle (PIP joint)
          const isFingerOpen = (tipIndex) => {
            const pipIndex = tipIndex - 2; // The knuckle below the tip
            const tipDistToWrist = Math.hypot(
              lm[tipIndex].x - lm[0].x,
              lm[tipIndex].y - lm[0].y,
            );
            const pipDistToWrist = Math.hypot(
              lm[pipIndex].x - lm[0].x,
              lm[pipIndex].y - lm[0].y,
            );
            return tipDistToWrist > pipDistToWrist;
          };

          const indexOpen = isFingerOpen(8);
          const middleOpen = isFingerOpen(12);
          const ringOpen = isFingerOpen(16);
          const pinkyOpen = isFingerOpen(20);

          // Strict state definitions
          const isWritingGesture =
            indexOpen && !middleOpen && !ringOpen && !pinkyOpen;
          const isEraserGesture =
            indexOpen && middleOpen && ringOpen && pinkyOpen;

          // --- STATE MACHINE ---
          let detectedMode = "IDLE";
          if (isPinchingGesture) detectedMode = "PINCH";
          else if (isEraserGesture) detectedMode = "ERASE";
          else if (isWritingGesture) detectedMode = "WRITE";

          // Debouncer (must hold gesture for 2 frames to switch, prevents flicker)
          if (detectedMode !== currentGesture) {
            gestureTimer++;
            if (gestureTimer >= 2) {
              currentGesture = detectedMode;
              gestureTimer = 0;
              if (currentGesture !== "WRITE") lastPos = null;
              if (currentGesture !== "PINCH") isPinching = false;
            }
          } else {
            gestureTimer = 0;
          }

          // --- EXECUTION ---
          statusText.innerText = `MODE: ${currentGesture}`;

          if (currentGesture === "WRITE") {
            if (lastPos) addLineOfSparks(lastPos, indexTip);
            else particles.push(new Spark(indexTip.x, indexTip.y, true));
            lastPos = indexTip;
          } else if (currentGesture === "PINCH") {
            if (!isPinching) {
              isPinching = true;
              lastPinchPos = { x: thumbTip.x, y: thumbTip.y };
            }
            const dx = thumbTip.x - lastPinchPos.x;
            const dy = thumbTip.y - lastPinchPos.y;
            particles.forEach((p) => {
              p.x += dx;
              p.y += dy;
            });
            lastPinchPos = { x: thumbTip.x, y: thumbTip.y };
          } else if (currentGesture === "ERASE") {
            const r = 80;
            particles = particles.filter(
              (p) => Math.hypot(p.x - palmCenter.x, p.y - palmCenter.y) > r,
            );
            canvasCtx.strokeStyle = "rgba(255,100,0,0.3)";
            canvasCtx.beginPath();
            canvasCtx.arc(palmCenter.x, palmCenter.y, r, 0, Math.PI * 2);
            canvasCtx.stroke();
          }
        } else {
          currentGesture = "IDLE";
          lastPos = null;
          statusText.innerText = "NO HAND DETECTED";
        }

        // Animation & Rendering
        particles = particles.filter((p) => {
          p.update();
          return p.isStatic || p.life > 0;
        });

        const miniScale = miniCanvas.width / canvasElement.width;
        particles.forEach((p) => {
          p.draw(canvasCtx);
          p.draw(miniCtx, miniScale);
        });
      }

      const hands = new Hands({
        locateFile: (file) =>
          `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`,
      });
      hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.85,
        minTrackingConfidence: 0.85,
      });
      hands.onResults(onResults);

      const camera = new Camera(videoElement, {
        onFrame: async () => {
          await hands.send({ image: videoElement });
          if (miniVideo.srcObject !== videoElement.srcObject)
            miniVideo.srcObject = videoElement.srcObject;
        },
        width: 1280,
        height: 720,
      });

      navigator.mediaDevices.getUserMedia({ video: true }).then((stream) => {
        videoElement.srcObject = stream;
        miniVideo.srcObject = stream;
        camera.start();
      });
    </script>
  </body>
</html>
