<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Multi-Link Pendulum</title>
    <style>
        body { margin: 0; overflow: hidden; background: #08080a; font-family: 'Segoe UI', system-ui, sans-serif; color: white; }
        canvas { position: absolute; top: 0; left: 0; touch-action: none; }
        #ui {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            background: rgba(15, 15, 20, 0.95); backdrop-filter: blur(12px);
            padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; gap: 15px; width: 280px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button {
            padding: 12px; cursor: pointer; border: none; border-radius: 8px;
            background: #27272a; color: white; font-weight: bold; transition: all 0.2s;
            text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px;
        }
        button:hover { background: #3f3f46; transform: translateY(-1px); }
        button#playBtn { background: #10b981; grid-column: span 2; font-size: 1rem; }
        button#playBtn.active { background: #f59e0b; color: #000; }
        button#spinBtn.active { background: #6366f1; }
        button#clearBtn { background: #ef4444; }
        .slider-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.5; font-weight: 700; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #6366f1; height: 6px; border-radius: 5px; appearance: none; background: #3f3f46; }
        .status { font-size: 0.75rem; padding: 8px; border-radius: 6px; text-align: center; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div id="ui">
        <button id="playBtn">START SIMULATION</button>
        <div class="controls">
            <button id="spinBtn">Spin: OFF</button>
            <button id="clearBtn">Reset</button>
        </div>
        
        <div class="slider-group">
            <label>Spin Velocity</label>
            <input type="range" id="speedSlider" min="0" max="0.3" step="0.01" value="0.08">
        </div>

        <div id="statusLabel" class="status">Mode: Drawing...</div>
    </div>

    <canvas id="trailCanvas"></canvas>
    <canvas id="mainCanvas"></canvas>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const tCanvas = document.getElementById('trailCanvas');
        const tCtx = tCanvas.getContext('2d');
        
        const playBtn = document.getElementById('playBtn');
        const spinBtn = document.getElementById('spinBtn');
        const clearBtn = document.getElementById('clearBtn');
        const speedSlider = document.getElementById('speedSlider');
        const statusLabel = document.getElementById('statusLabel');

        let width, height, centerX, centerY;
        let points = []; 
        let constraints = [];
        
        let isPlaying = false;
        let isSpinning = false;
        let angle = 0;

        const gravityVal = 0.55;
        const friction = 0.998;
        const iterations = 40; // Increased for tighter physics

        function init() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = tCanvas.width = width;
            canvas.height = tCanvas.height = height;
            centerX = width / 2;
            centerY = height / 2;
            
            points = [{
                x: centerX, y: centerY, 
                oldX: centerX, oldY: centerY, 
                pinned: true
            }];
            render();
        }

        window.addEventListener('resize', init);

        canvas.addEventListener('mousedown', (e) => {
            if (isPlaying) return;

            const mx = e.clientX;
            const my = e.clientY;

            const prev = points[points.length - 1];
            points.push({ 
                x: mx, y: my, 
                oldX: mx, oldY: my, 
                pinned: false
            });
            constraints.push({
                p1: prev, p2: points[points.length-1],
                length: Math.hypot(prev.x - mx, prev.y - my)
            });
        });

        playBtn.addEventListener('click', () => {
            isPlaying = !isPlaying;
            playBtn.textContent = isPlaying ? "PAUSE / EDIT" : "START SIMULATION";
            playBtn.classList.toggle('active', isPlaying);
            statusLabel.textContent = isPlaying ? "Mode: Simulating" : "Mode: Drawing...";
            statusLabel.style.color = isPlaying ? "#10b981" : "#fff";
        });

        spinBtn.addEventListener('click', () => {
            isSpinning = !isSpinning;
            spinBtn.textContent = isSpinning ? "Spin: ON" : "Spin: OFF";
            spinBtn.classList.toggle('active', isSpinning);
        });

        clearBtn.addEventListener('click', () => {
            tCtx.clearRect(0, 0, width, height);
            isPlaying = false;
            isSpinning = false;
            angle = 0;
            playBtn.textContent = "START SIMULATION";
            spinBtn.textContent = "Spin: OFF";
            playBtn.classList.remove('active');
            spinBtn.classList.remove('active');
            statusLabel.textContent = "Mode: Drawing...";
            init();
            constraints = [];
        });

        function update() {
            if (!isPlaying) return;

            if (isSpinning) angle += parseFloat(speedSlider.value);

            // 1. Verlet Integration
            points.forEach((p) => {
                if (p.pinned) return;
                const vx = (p.x - p.oldX) * friction;
                const vy = (p.y - p.oldY) * friction;
                p.oldX = p.x;
                p.oldY = p.y;
                p.x += vx;
                p.y += vy + gravityVal;
            });

            // 2. Solve Constraints
            for (let i = 0; i < iterations; i++) {
                // Pin the motor if spinning
                if (isSpinning && points.length > 1) {
                    const motor = points[1];
                    const dist = constraints[0].length;
                    motor.x = centerX + Math.cos(angle) * dist;
                    motor.y = centerY + Math.sin(angle) * dist;
                }

                constraints.forEach(c => {
                    const dx = c.p2.x - c.p1.x;
                    const dy = c.p2.y - c.p1.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const diff = (c.length - dist) / dist;
                    const m = 0.5;
                    const ox = dx * diff * m;
                    const oy = dy * diff * m;

                    if (!c.p1.pinned) { c.p1.x -= ox; c.p1.y -= oy; }
                    if (!c.p2.pinned) { c.p2.x += ox; c.p2.y += oy; }
                });

                points[0].x = centerX;
                points[0].y = centerY;
            }
        }

        function render() {
            ctx.clearRect(0, 0, width, height);

            // Connections
            ctx.beginPath();
            ctx.lineWidth = 2.5;
            ctx.strokeStyle = "rgba(255,255,255,0.3)";
            points.forEach((p, i) => {
                if (i === 0) ctx.moveTo(p.x, p.y);
                else ctx.lineTo(p.x, p.y);
            });
            ctx.stroke();

            // Points & Dynamic Trails
            points.forEach((p, i) => {
                ctx.fillStyle = p.pinned ? "#fbbf24" : "#6366f1";
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.pinned ? 8 : 4, 0, Math.PI * 2);
                ctx.fill();

                // TRACE LOGIC: 
                // i === 0 is the center pivot (no trace)
                // i === 1 is the first moving joint (skipping as requested)
                if (isPlaying && i > 1) {
                    tCtx.strokeStyle = `hsla(${(i * 55) % 360}, 85%, 60%, 0.3)`;
                    tCtx.lineWidth = 1.4;
                    tCtx.beginPath();
                    tCtx.moveTo(p.lx || p.x, p.ly || p.y);
                    tCtx.lineTo(p.x, p.y);
                    tCtx.stroke();
                }
                // Store last positions for the next frame's trail line
                p.lx = p.x;
                p.ly = p.y;
            });
        }

        function loop() {
            update();
            render();
            requestAnimationFrame(loop);
        }

        init();
        loop();
    </script>
</body>
</html>
