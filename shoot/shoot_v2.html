<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pistol Gesture Shooter - Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0a; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; text-shadow: 2px 2px 4px #000; }
        #score { font-size: 2rem; color: #0f0; }
        #video-container { 
            position: absolute; bottom: 20px; right: 20px; 
            width: 200px; height: 150px; border: 2px solid #444; 
            border-radius: 8px; overflow: hidden; transform: scaleX(-1); /* Mirror view */
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #aaa; }
    </style>
</head>
<body>
    <div id="ui">SCORE: <span id="score">0</span></div>
    <div id="msg">Calibrating Hand Tracking...</div>
    <div id="video-container"><video id="webcam" autoplay playsinline></video></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const msgEl = document.getElementById('msg');
        const video = document.getElementById('webcam');

        let score = 0;
        let discs = [];
        let vfx = [];
        let rawTarget = { x: 0, y: 0 };
        let smoothedAim = { x: 0, y: 0 };
        let isHandVisible = false;
        let canShoot = true;

        // Stability Factor: Lower = Smoother, Higher = More Responsive (0.1 is a sweet spot)
        const SMOOTHING = 0.15; 

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // --- Audio Engine (Synthetic Pop) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playPopSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // --- Game Logic ---
        const colors = ['#FF5733', '#33FF57', '#3357FF', '#F333FF', '#FFF333', '#33FFF3'];

        class Disc {
            constructor() {
                const side = Math.floor(Math.random() * 4);
                if (side === 0) { this.x = -50; this.y = Math.random() * canvas.height; }
                else if (side === 1) { this.x = canvas.width + 50; this.y = Math.random() * canvas.height; }
                else if (side === 2) { this.x = Math.random() * canvas.width; this.y = -50; }
                else { this.x = Math.random() * canvas.width; this.y = canvas.height + 50; }

                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.speed = 2 + Math.random() * 2;
                this.radius = 35;
                const angle = Math.atan2(canvas.height/2 - this.y, canvas.width/2 - this.x);
                this.vx = Math.cos(angle) * this.speed;
                this.vy = Math.sin(angle) * this.speed;
            }
            update() { this.x += this.vx; this.y += this.vy; }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        function triggerShoot() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            let hit = false;
            for (let i = discs.length - 1; i >= 0; i--) {
                const d = discs[i];
                const dist = Math.sqrt((smoothedAim.x - d.x)**2 + (smoothedAim.y - d.y)**2);
                if (dist < d.radius + 30) { // Aim Assist Range
                    playPopSound();
                    discs.splice(i, 1);
                    score += 10;
                    scoreEl.innerText = score;
                    vfx.push({x: d.x, y: d.y, text: "HIT!", life: 1, color: "#0f0"});
                    hit = true;
                    break;
                }
            }
            if (!hit) vfx.push({x: smoothedAim.x, y: smoothedAim.y, text: "MISS", life: 1, color: "#f00"});
        }

        // --- Hand Tracking ---
        const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

        hands.onResults((res) => {
            msgEl.style.display = 'none';
            if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
                isHandVisible = true;
                const pts = res.multiHandLandmarks[0];
                rawTarget.x = (1 - pts[8].x) * canvas.width;
                rawTarget.y = pts[8].y * canvas.height;

                // Trigger logic: Thumb tip proximity to thumb base
                const triggerDist = Math.sqrt((pts[4].x - pts[2].x)**2 + (pts[4].y - pts[2].y)**2);
                if (triggerDist < 0.05) {
                    if (canShoot) { triggerShoot(); canShoot = false; }
                } else { canShoot = true; }
            } else { isHandVisible = false; }
        });

        const camera = new Camera(video, {
            onFrame: async () => { await hands.send({image: video}); },
            width: 640, height: 480
        });
        camera.start();

        // --- Render Loop ---
        function draw() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 1. Smooth the Aiming (Lerp)
            smoothedAim.x += (rawTarget.x - smoothedAim.x) * SMOOTHING;
            smoothedAim.y += (rawTarget.y - smoothedAim.y) * SMOOTHING;

            // 2. Discs
            while (discs.length < 4) discs.push(new Disc());
            discs.forEach((d, i) => {
                d.update(); d.draw();
                if (Math.abs(d.x - canvas.width/2) < 10 && Math.abs(d.y - canvas.height/2) < 10) discs.splice(i, 1);
            });

            // 3. VFX
            vfx.forEach((v, i) => {
                ctx.fillStyle = v.color;
                ctx.font = `bold ${24}px sans-serif`;
                ctx.fillText(v.text, v.x, v.y - (1 - v.life) * 40);
                v.life -= 0.04;
                if (v.life <= 0) vfx.splice(i, 1);
            });

            // 4. UI Elements (Laser & Crosshair)
            if (isHandVisible) {
                ctx.lineWidth = 2;
                ctx.setLineDash([10, 5]);
                ctx.strokeStyle = 'rgba(255, 0, 0, 0.3)';
                ctx.beginPath();
                ctx.moveTo(smoothedAim.x, smoothedAim.y);
                ctx.lineTo(smoothedAim.x, 0);
                ctx.stroke();
                ctx.setLineDash([]);

                ctx.beginPath();
                ctx.arc(smoothedAim.x, smoothedAim.y, 15, 0, Math.PI*2);
                ctx.strokeStyle = '#f00';
                ctx.stroke();
            }

            requestAnimationFrame(draw);
        }
        draw();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
