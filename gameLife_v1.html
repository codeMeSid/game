<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Autonomous Cellular Automata</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: sans-serif;
        }
        #info {
            position: absolute;
            top: 15px;
            left: 15px;
            color: rgba(255, 255, 255, 0.8);
            pointer-events: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>
    <div id="info">
        <h2>Voxel Automata</h2>
        <p>Conway's rules with age-based height and color shifting.</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Configuration ---
        const GRID_SIZE = 60; // 60x60 = 3600 voxels
        const TOTAL_CELLS = GRID_SIZE * GRID_SIZE;
        const TICK_RATE = 500; // ms between Game of Life generations
        const LERP_SPEED = 0.08; // Speed of visual transitions

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050505, 0.015);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(GRID_SIZE * 0.8, GRID_SIZE * 0.6, GRID_SIZE * 0.8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0, 0);
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 2);
        dirLight.position.set(50, 100, 20);
        scene.add(dirLight);

        // --- Instanced Mesh Setup ---
        const geometry = new THREE.BoxGeometry(0.9, 1, 0.9);
        const material = new THREE.MeshStandardMaterial({ 
            color: 0xffffff, 
            roughness: 0.2, 
            metalness: 0.1 
        });
        
        const instancedMesh = new THREE.InstancedMesh(geometry, material, TOTAL_CELLS);
        scene.add(instancedMesh);

        // --- Data State ---
        let grid = new Int8Array(TOTAL_CELLS);
        let ages = new Int32Array(TOTAL_CELLS);
        
        // Visual state arrays for smooth interpolation
        const currentHeights = new Float32Array(TOTAL_CELLS).fill(0.1);
        const targetHeights = new Float32Array(TOTAL_CELLS).fill(0.1);
        
        const currentColors = Array.from({ length: TOTAL_CELLS }, () => new THREE.Color(0x111111));
        const targetColors = Array.from({ length: TOTAL_CELLS }, () => new THREE.Color(0x111111));

        const dummy = new THREE.Object3D();
        const baseColor = new THREE.Color(0x111111); // Dead state

        // Gradient Colors for Age
        const colorPalette = [
            new THREE.Color(0x00ffcc), // Age 1: Cyan
            new THREE.Color(0x0066ff), // Age 3: Blue
            new THREE.Color(0x9900ff), // Age 6: Purple
            new THREE.Color(0xff0066), // Age 10: Pink/Red
            new THREE.Color(0xffcc00), // Age 15: Yellow
            new THREE.Color(0xffffff)  // Age 20+: White (Oldest)
        ];

        // --- Initialize Grid ---
        const offset = GRID_SIZE / 2;
        for (let i = 0; i < TOTAL_CELLS; i++) {
            // Randomly seed the initial state (20% chance of life)
            grid[i] = Math.random() > 0.8 ? 1 : 0;
            ages[i] = grid[i] ? 1 : 0;
        }

        // --- Helper Functions ---
        function getIndex(x, z) {
            // Wrap around (Torus topology)
            const wrapX = (x + GRID_SIZE) % GRID_SIZE;
            const wrapZ = (z + GRID_SIZE) % GRID_SIZE;
            return wrapX + wrapZ * GRID_SIZE;
        }

        function countNeighbors(x, z) {
            let sum = 0;
            for (let i = -1; i <= 1; i++) {
                for (let j = -1; j <= 1; j++) {
                    if (i === 0 && j === 0) continue;
                    sum += grid[getIndex(x + i, z + j)];
                }
            }
            return sum;
        }

        function getColorForAge(age) {
            if (age === 0) return baseColor;
            if (age >= 20) return colorPalette[5];
            if (age >= 15) return colorPalette[4];
            if (age >= 10) return colorPalette[3];
            if (age >= 6) return colorPalette[2];
            if (age >= 3) return colorPalette[1];
            return colorPalette[0];
        }

        // --- Simulation Logic ---
        function updateSimulation() {
            const nextGrid = new Int8Array(TOTAL_CELLS);
            
            for (let x = 0; x < GRID_SIZE; x++) {
                for (let z = 0; z < GRID_SIZE; z++) {
                    const idx = getIndex(x, z);
                    const isAlive = grid[idx] === 1;
                    const neighbors = countNeighbors(x, z);

                    // Conway's Rules
                    if (isAlive && (neighbors === 2 || neighbors === 3)) {
                        nextGrid[idx] = 1; // Survive
                        ages[idx]++;
                    } else if (!isAlive && neighbors === 3) {
                        nextGrid[idx] = 1; // Born
                        ages[idx] = 1;
                    } else {
                        nextGrid[idx] = 0; // Die
                        ages[idx] = 0;
                    }

                    // Set Visual Targets
                    if (nextGrid[idx] === 1) {
                        targetHeights[idx] = Math.min(1 + (ages[idx] * 0.4), 12); // Max height of 12
                        targetColors[idx] = getColorForAge(ages[idx]);
                    } else {
                        targetHeights[idx] = 0.1; // Shrink to almost nothing
                        targetColors[idx] = baseColor;
                    }
                }
            }
            
            grid.set(nextGrid);
        }

        // --- Render & Animation Loop ---
        let lastTick = 0;

        function animate(time) {
            requestAnimationFrame(animate);
            controls.update();

            // Fire simulation step at specified intervals
            if (time - lastTick > TICK_RATE) {
                updateSimulation();
                lastTick = time;
            }

            // Smoothly interpolate visual states (Render Frame)
            for (let x = 0; x < GRID_SIZE; x++) {
                for (let z = 0; z < GRID_SIZE; z++) {
                    const idx = getIndex(x, z);
                    
                    // Lerp Height
                    currentHeights[idx] += (targetHeights[idx] - currentHeights[idx]) * LERP_SPEED;
                    
                    // Lerp Color
                    currentColors[idx].lerp(targetColors[idx], LERP_SPEED);

                    // Apply to Instance Matrix
                    const posX = x - offset;
                    const posZ = z - offset;
                    // Position Y so the base stays on the "ground" as it scales up
                    const posY = currentHeights[idx] / 2; 

                    dummy.position.set(posX, posY, posZ);
                    dummy.scale.set(1, currentHeights[idx], 1);
                    dummy.updateMatrix();

                    instancedMesh.setMatrixAt(idx, dummy.matrix);
                    instancedMesh.setColorAt(idx, currentColors[idx]);
                }
            }

            // Tell Three.js the matrices and colors have changed this frame
            instancedMesh.instanceMatrix.needsUpdate = true;
            if (instancedMesh.instanceColor) {
                instancedMesh.instanceColor.needsUpdate = true;
            }

            renderer.render(scene, camera);
        }

        // Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start Loop
        requestAnimationFrame(animate);
    </script>
</body>
</html>
