<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live String Art Simulator - Real Canvas</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }

        #mainCanvas {
            background-color: #f0e6d2; 
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        #minimap {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background-color: #fff;
            border: 2px solid #444;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        #fileInput {
            display: none;
        }

        #instructions {
            position: absolute;
            color: rgba(255, 255, 255, 0.8);
            pointer-events: none;
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 10px;
        }

        /* Top Left UI Panels */
        .ui-panel {
            position: fixed;
            left: 20px;
            color: #ddd;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 15px;
            border-radius: 5px;
            border: 1px solid #444;
            backdrop-filter: blur(4px);
            z-index: 10;
        }

        #counter {
            top: 20px;
            font-weight: bold;
            font-size: 16px;
        }

        #controls {
            top: 70px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 14px;
        }

        #controls input[type="range"] {
            width: 150px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <input type="file" id="fileInput" accept="image/*">
    <canvas id="mainCanvas"></canvas>
    <canvas id="minimap"></canvas>
    
    <div id="instructions">
        <h2>Click to Upload Image</h2>
        <p>Simulation will start automatically</p>
    </div>
    
    <div id="counter" class="ui-panel">Strings: 0</div>

    <div id="controls" class="ui-panel">
        <label for="maxLinesInput">Max Strings: <span id="maxLinesValue">4000</span></label>
        <input type="range" id="maxLinesInput" min="500" max="10000" step="100" value="4000">
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const minimap = document.getElementById('minimap');
        const miniCtx = minimap.getContext('2d', { willReadFrequently: true });
        const fileInput = document.getElementById('fileInput');
        const instructions = document.getElementById('instructions');
        const counterText = document.getElementById('counter');
        
        // New Control Elements
        const maxLinesInput = document.getElementById('maxLinesInput');
        const maxLinesValue = document.getElementById('maxLinesValue');

        // Setup Canvas Size (Radius = half viewport - 10px)
        const minDim = Math.min(window.innerWidth, window.innerHeight);
        const radius = (minDim / 2) - 10;
        const canvasSize = radius * 2;
        canvas.width = canvasSize;
        canvas.height = canvasSize;
        
        const cx = radius;
        const cy = radius;

        // Configuration
        const numPins = 240;
        let maxLines = parseInt(maxLinesInput.value); // Now dynamic based on the slider
        const lineWeight = 15; 
        const pins = [];
        
        let targetImageData = null;
        let isSimulating = false;
        let currentPin = 0;
        let linesDrawn = 0;
        let animationId;

        // Handle Slider Changes
        maxLinesInput.addEventListener('input', (e) => {
            maxLines = parseInt(e.target.value);
            maxLinesValue.innerText = maxLines;
            
            // If the simulation had finished, but we increased the cap, resume drawing!
            if (!isSimulating && targetImageData && linesDrawn < maxLines) {
                isSimulating = true;
                stepSimulation();
            }
        });

        // Initialize Pin Coordinates
        for (let i = 0; i < numPins; i++) {
            const angle = (Math.PI * 2 * i) / numPins;
            pins.push({
                x: cx + (radius - 1) * Math.cos(angle),
                y: cy + (radius - 1) * Math.sin(angle)
            });
        }

        // Handle Click to Upload
        canvas.addEventListener('click', () => {
            fileInput.click();
        });

        // Handle Image Upload
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => processImage(img);
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        function processImage(img) {
            isSimulating = false;
            cancelAnimationFrame(animationId);
            linesDrawn = 0;
            currentPin = 0;
            counterText.innerText = `Strings: 0`;
            instructions.style.display = 'none';

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const offCanvas = document.createElement('canvas');
            offCanvas.width = canvasSize;
            offCanvas.height = canvasSize;
            const offCtx = offCanvas.getContext('2d', { willReadFrequently: true });

            offCtx.fillStyle = '#fff';
            offCtx.fillRect(0, 0, canvasSize, canvasSize);

            const scale = Math.max(canvasSize / img.width, canvasSize / img.height);
            const w = img.width * scale;
            const h = img.height * scale;
            const x = (canvasSize - w) / 2;
            const y = (canvasSize - h) / 2;

            offCtx.beginPath();
            offCtx.arc(cx, cy, radius, 0, Math.PI * 2);
            offCtx.clip();
            offCtx.drawImage(img, x, y, w, h);

            targetImageData = offCtx.getImageData(0, 0, canvasSize, canvasSize);
            const data = targetImageData.data;
            
            for (let i = 0; i < data.length; i += 4) {
                const brightness = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
                const darkness = 255 - brightness;
                data[i] = darkness;
                data[i+1] = darkness;
                data[i+2] = darkness;
                data[i+3] = 255; 
            }

            minimap.width = 150;
            minimap.height = 150;
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvasSize;
            tempCanvas.height = canvasSize;
            tempCanvas.getContext('2d').putImageData(targetImageData, 0, 0);
            miniCtx.drawImage(tempCanvas, 0, 0, 150, 150);

            isSimulating = true;
            stepSimulation();
        }

        function getLinePixels(x0, y0, x1, y1) {
            const pixels = [];
            x0 = Math.floor(x0); y0 = Math.floor(y0);
            x1 = Math.floor(x1); y1 = Math.floor(y1);
            let dx = Math.abs(x1 - x0), sx = x0 < x1 ? 1 : -1;
            let dy = Math.abs(y1 - y0), sy = y0 < y1 ? 1 : -1;
            let err = dx - dy;

            while (true) {
                pixels.push({x: x0, y: y0});
                if (x0 === x1 && y0 === y1) break;
                let e2 = 2 * err;
                if (e2 > -dy) { err -= dy; x0 += sx; }
                if (e2 < dx) { err += dx; y0 += sy; }
            }
            return pixels;
        }

        function stepSimulation() {
            if (!isSimulating || linesDrawn >= maxLines) {
                isSimulating = false;
                return;
            }

            for (let iter = 0; iter < 15; iter++) {
                if (linesDrawn >= maxLines) break;

                let bestScore = -1;
                let bestPin = -1;
                let bestPixels = null;

                for (let nextPin = 0; nextPin < numPins; nextPin++) {
                    let dist = Math.abs(nextPin - currentPin);
                    if (dist < 15 || dist > numPins - 15) continue;

                    let p1 = pins[currentPin];
                    let p2 = pins[nextPin];
                    let pixels = getLinePixels(p1.x, p1.y, p2.x, p2.y);

                    let score = 0;
                    for (let p of pixels) {
                        if(p.x >= 0 && p.x < canvasSize && p.y >= 0 && p.y < canvasSize) {
                            let idx = (p.y * canvasSize + p.x) * 4;
                            score += targetImageData.data[idx]; 
                        }
                    }
                    score = score / pixels.length;

                    if (score > bestScore) {
                        bestScore = score;
                        bestPin = nextPin;
                        bestPixels = pixels;
                    }
                }

                if (bestPin !== -1 && bestPixels) {
                    ctx.beginPath();
                    ctx.moveTo(pins[currentPin].x, pins[currentPin].y);
                    ctx.lineTo(pins[bestPin].x, pins[bestPin].y);
                    ctx.strokeStyle = 'rgba(0, 0, 0, 0.15)'; 
                    ctx.lineWidth = 0.5; 
                    ctx.stroke();

                    for (let p of bestPixels) {
                        if(p.x >= 0 && p.x < canvasSize && p.y >= 0 && p.y < canvasSize) {
                            let idx = (p.y * canvasSize + p.x) * 4;
                            targetImageData.data[idx] = Math.max(0, targetImageData.data[idx] - lineWeight);
                            targetImageData.data[idx+1] = Math.max(0, targetImageData.data[idx+1] - lineWeight);
                            targetImageData.data[idx+2] = Math.max(0, targetImageData.data[idx+2] - lineWeight);
                        }
                    }

                    currentPin = bestPin;
                    linesDrawn++;
                    counterText.innerText = `Strings: ${linesDrawn}`;
                } else {
                    isSimulating = false;
                    break; 
                }
            }

            if (isSimulating) {
                animationId = requestAnimationFrame(stepSimulation);
            }
        }
    </script>
</body>
</html>
