<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live String Art Simulator</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        /* --- CORE STYLES --- */
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #mainCanvas {
            background-color: #f0e6d2; 
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            z-index: 1;
        }

        #minimap {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background-color: #fff;
            border: 2px solid #444;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            pointer-events: none;
            z-index: 10;
        }

        #fileInput {
            display: none;
        }

        #instructions {
            position: absolute;
            color: rgba(255, 255, 255, 0.9);
            pointer-events: none;
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px 30px;
            border-radius: 10px;
            z-index: 5;
        }

        /* --- UI PANELS --- */
        .ui-panel {
            position: fixed;
            left: 20px;
            color: #ddd;
            background: rgba(0, 0, 0, 0.7);
            padding: 12px 18px;
            border-radius: 8px;
            border: 1px solid #444;
            backdrop-filter: blur(4px);
            z-index: 10;
        }

        #counter {
            top: 20px;
            font-weight: bold;
            font-size: 16px;
        }

        #controls {
            top: 75px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            font-size: 14px;
        }

        #controls input[type="range"] {
            width: 160px;
            cursor: pointer;
        }

        .btn {
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn:hover { background-color: #45a049; }
        .btn:disabled { background-color: #555; color: #888; cursor: not-allowed; }

        /* --- LEAFLET MODAL --- */
        #printModal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            overflow-y: auto;
            padding: 20px;
        }

        #pdfContainer {
            background: white;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px;
            color: #333;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .original-img {
            width: 150px; height: 150px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid #ccc;
        }

        /* Checklist Formatting */
        .sequence-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sequence-row {
            display: flex;
            align-items: flex-start;
            background: #fdfdfd;
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            page-break-inside: avoid; /* Keeps chunks together in PDF */
        }

        .sequence-row input[type="checkbox"] {
            margin-top: 4px;
            margin-right: 15px;
            transform: scale(1.3);
            cursor: pointer;
        }

        .sequence-row label {
            font-family: monospace;
            font-size: 15px;
            line-height: 1.6;
            cursor: pointer;
        }

        .sequence-row strong {
            display: inline-block;
            width: 110px;
            color: #4CAF50;
        }

        .modal-actions {
            max-width: 800px;
            margin: 0 auto 20px auto;
            display: flex;
            gap: 10px;
            background: white;
            padding: 15px;
            border-radius: 8px;
        }

        #closeModalBtn { background-color: #f44336; }
        #closeModalBtn:hover { background-color: #d32f2f; }
        #downloadPdfBtn { background-color: #2196F3; }
        #downloadPdfBtn:hover { background-color: #0b7dda; }

    </style>
</head>
<body>

    <input type="file" id="fileInput" accept="image/*">
    
    <canvas id="mainCanvas"></canvas>
    <canvas id="minimap"></canvas>
    
    <div id="instructions">
        <h2>Click Screen to Upload Image</h2>
        <p>Simulation will begin automatically</p>
    </div>
    
    <div id="counter" class="ui-panel">Strings: 0</div>
    <div id="controls" class="ui-panel">
        <label for="maxLinesInput">Max Strings: <span id="maxLinesValue">4000</span></label>
        <input type="range" id="maxLinesInput" min="500" max="10000" step="100" value="4000">
        <button id="viewLeafletBtn" class="btn" disabled>📄 View & Download</button>
    </div>

    <div id="printModal">
        <div class="modal-actions">
            <button class="btn" id="downloadPdfBtn">📥 Download as PDF</button>
            <button class="btn" id="printActionBtn" onclick="window.print()">🖨️ Print Direct</button>
            <button class="btn" id="closeModalBtn" style="margin-left: auto;">❌ Close</button>
        </div>

        <div id="pdfContainer">
            <div class="modal-header">
                <div>
                    <h1 style="margin:0 0 10px 0;">String Art Blueprint</h1>
                    <p><strong>Total Pins:</strong> 240</p>
                    <p><strong>Total Strings:</strong> <span id="printTotalStrings">0</span></p>
                    <p><em>Start at Pin 1. Numbers run clockwise. Connect the pins in the order shown.</em></p>
                </div>
                <img id="printOriginalImg" class="original-img" src="" alt="Target">
            </div>

            <h2>Connection Sequence</h2>
            <div class="sequence-box" id="printSequence"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const minimap = document.getElementById('minimap');
        const miniCtx = minimap.getContext('2d', { willReadFrequently: true });
        
        const fileInput = document.getElementById('fileInput');
        const instructions = document.getElementById('instructions');
        const counterText = document.getElementById('counter');
        const maxLinesInput = document.getElementById('maxLinesInput');
        const maxLinesValue = document.getElementById('maxLinesValue');
        const viewLeafletBtn = document.getElementById('viewLeafletBtn');
        
        // Modal Elements
        const printModal = document.getElementById('printModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const downloadPdfBtn = document.getElementById('downloadPdfBtn');
        const printTotalStrings = document.getElementById('printTotalStrings');
        const printSequence = document.getElementById('printSequence');
        const printOriginalImg = document.getElementById('printOriginalImg');

        // Setup Canvas
        const minDim = Math.max(200, Math.min(window.innerWidth, window.innerHeight));
        const radius = (minDim / 2) - 20;
        const canvasSize = radius * 2;
        canvas.width = canvasSize;
        canvas.height = canvasSize;
        
        const cx = radius;
        const cy = radius;

        // Configuration
        const numPins = 240;
        let maxLines = parseInt(maxLinesInput.value); 
        const lineWeight = 15; 
        const pins = [];
        
        // State
        let targetImageData = null;
        let isSimulating = false;
        let currentPin = 0;
        let linesDrawn = 0;
        let animationId;
        let pinSequence = [];
        let originalImageSrc = '';

        maxLinesInput.addEventListener('input', (e) => {
            maxLines = parseInt(e.target.value);
            maxLinesValue.innerText = maxLines;
            if (!isSimulating && targetImageData && linesDrawn < maxLines) {
                isSimulating = true;
                stepSimulation();
            }
        });

        for (let i = 0; i < numPins; i++) {
            const angle = (Math.PI * 2 * i) / numPins;
            pins.push({
                x: cx + (radius - 1) * Math.cos(angle),
                y: cy + (radius - 1) * Math.sin(angle)
            });
        }

        canvas.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                originalImageSrc = event.target.result; 
                const img = new Image();
                img.onload = () => processImage(img);
                img.src = originalImageSrc;
            };
            reader.readAsDataURL(file);
        });

        function processImage(img) {
            isSimulating = false;
            cancelAnimationFrame(animationId);
            linesDrawn = 0;
            currentPin = 0;
            pinSequence = [1]; 
            counterText.innerText = `Strings: 0`;
            instructions.style.display = 'none';
            viewLeafletBtn.disabled = false;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const offCanvas = document.createElement('canvas');
            offCanvas.width = canvasSize;
            offCanvas.height = canvasSize;
            const offCtx = offCanvas.getContext('2d', { willReadFrequently: true });

            offCtx.fillStyle = '#fff';
            offCtx.fillRect(0, 0, canvasSize, canvasSize);

            const scale = Math.max(canvasSize / img.width, canvasSize / img.height);
            const w = img.width * scale;
            const h = img.height * scale;
            const x = (canvasSize - w) / 2;
            const y = (canvasSize - h) / 2;

            offCtx.beginPath();
            offCtx.arc(cx, cy, radius, 0, Math.PI * 2);
            offCtx.clip();
            offCtx.drawImage(img, x, y, w, h);

            targetImageData = offCtx.getImageData(0, 0, canvasSize, canvasSize);
            const data = targetImageData.data;
            
            for (let i = 0; i < data.length; i += 4) {
                const brightness = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
                const darkness = 255 - brightness;
                data[i] = darkness;
                data[i+1] = darkness;
                data[i+2] = darkness;
                data[i+3] = 255; 
            }

            minimap.width = 150;
            minimap.height = 150;
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvasSize;
            tempCanvas.height = canvasSize;
            tempCanvas.getContext('2d').putImageData(targetImageData, 0, 0);
            miniCtx.drawImage(tempCanvas, 0, 0, 150, 150);

            isSimulating = true;
            stepSimulation();
        }

        function getLinePixels(x0, y0, x1, y1) {
            const pixels = [];
            x0 = Math.floor(x0); y0 = Math.floor(y0);
            x1 = Math.floor(x1); y1 = Math.floor(y1);
            let dx = Math.abs(x1 - x0), sx = x0 < x1 ? 1 : -1;
            let dy = Math.abs(y1 - y0), sy = y0 < y1 ? 1 : -1;
            let err = dx - dy;

            while (true) {
                pixels.push({x: x0, y: y0});
                if (x0 === x1 && y0 === y1) break;
                let e2 = 2 * err;
                if (e2 > -dy) { err -= dy; x0 += sx; }
                if (e2 < dx) { err += dx; y0 += sy; }
            }
            return pixels;
        }

        function stepSimulation() {
            if (!isSimulating || linesDrawn >= maxLines) {
                isSimulating = false;
                return;
            }

            for (let iter = 0; iter < 15; iter++) {
                if (linesDrawn >= maxLines) break;

                let bestScore = -1;
                let bestPin = -1;
                let bestPixels = null;

                for (let nextPin = 0; nextPin < numPins; nextPin++) {
                    let dist = Math.abs(nextPin - currentPin);
                    if (dist < 15 || dist > numPins - 15) continue;

                    let p1 = pins[currentPin];
                    let p2 = pins[nextPin];
                    let pixels = getLinePixels(p1.x, p1.y, p2.x, p2.y);

                    let score = 0;
                    for (let p of pixels) {
                        if(p.x >= 0 && p.x < canvasSize && p.y >= 0 && p.y < canvasSize) {
                            let idx = (p.y * canvasSize + p.x) * 4;
                            score += targetImageData.data[idx]; 
                        }
                    }
                    score = score / pixels.length;

                    if (score > bestScore) {
                        bestScore = score;
                        bestPin = nextPin;
                        bestPixels = pixels;
                    }
                }

                if (bestPin !== -1 && bestPixels) {
                    ctx.beginPath();
                    ctx.moveTo(pins[currentPin].x, pins[currentPin].y);
                    ctx.lineTo(pins[bestPin].x, pins[bestPin].y);
                    ctx.strokeStyle = 'rgba(0, 0, 0, 0.15)'; 
                    ctx.lineWidth = 0.5; 
                    ctx.stroke();

                    for (let p of bestPixels) {
                        if(p.x >= 0 && p.x < canvasSize && p.y >= 0 && p.y < canvasSize) {
                            let idx = (p.y * canvasSize + p.x) * 4;
                            targetImageData.data[idx] = Math.max(0, targetImageData.data[idx] - lineWeight);
                            targetImageData.data[idx+1] = Math.max(0, targetImageData.data[idx+1] - lineWeight);
                            targetImageData.data[idx+2] = Math.max(0, targetImageData.data[idx+2] - lineWeight);
                        }
                    }

                    currentPin = bestPin;
                    pinSequence.push(bestPin + 1); 
                    linesDrawn++;
                    counterText.innerText = `Strings: ${linesDrawn}`;
                } else {
                    isSimulating = false;
                    break; 
                }
            }

            if (isSimulating) {
                animationId = requestAnimationFrame(stepSimulation);
            }
        }

        // --- Leaflet Generation & PDF Logic ---
        viewLeafletBtn.addEventListener('click', () => {
            if (pinSequence.length === 0) return;

            // Generate Checklist Chunks (10 strings per row)
            let formattedSequence = '';
            for (let i = 0; i < pinSequence.length; i += 10) {
                const chunk = pinSequence.slice(i, i + 10);
                const startStr = i + 1;
                const endStr = i + chunk.length;
                
                formattedSequence += `
                    <div class="sequence-row">
                        <input type="checkbox" id="chk${i}">
                        <label for="chk${i}">
                            <strong>Step ${startStr}-${endStr}:</strong>
                            <span>${chunk.join(' ➔ ')}</span>
                        </label>
                    </div>
                `;
            }

            printTotalStrings.innerText = linesDrawn;
            printOriginalImg.src = originalImageSrc;
            printSequence.innerHTML = formattedSequence;

            printModal.style.display = 'block';
        });

        // Close Modal
        closeModalBtn.addEventListener('click', () => {
            printModal.style.display = 'none';
        });

        // Generate PDF using html2pdf.js
        downloadPdfBtn.addEventListener('click', () => {
            const element = document.getElementById('pdfContainer');
            
            // Configuration for the PDF creation
            const opt = {
                margin:       0.5,
                filename:     'String-Art-Blueprint.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2 },
                jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
            };

            // Change button text while processing to give user feedback
            downloadPdfBtn.innerText = "⏳ Generating...";
            downloadPdfBtn.disabled = true;

            html2pdf().set(opt).from(element).save().then(() => {
                // Reset button text
                downloadPdfBtn.innerText = "📥 Download as PDF";
                downloadPdfBtn.disabled = false;
            });
        });
    </script>
</body>
</html>
