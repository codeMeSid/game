<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elastic Inter-Hand Strings</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background-color: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
  let handData = [];
  let capture;
  let hands;

  function setup() {
    createCanvas(windowWidth, windowHeight);
    colorMode(HSB, 360, 100, 100, 1);
    
    capture = createCapture(VIDEO);
    capture.size(640, 480);
    capture.hide(); 

    hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 2,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.7
    });

    hands.onResults(onResults);

    const camera = new Camera(capture.elt, {
      onFrame: async () => {
        await hands.send({ image: capture.elt });
      },
      width: 640,
      height: 480
    });
    camera.start();
  }

  function onResults(results) {
    handData = results.multiHandLandmarks;
  }

  function draw() {
    background(5); // Clear background every frame (no ghosting)

    push(); 
    translate(width, 0); 
    scale(-1, 1); 

    // Only proceed if exactly two hands are detected
    if (handData && handData.length === 2) {
      let hand1 = handData[0];
      let hand2 = handData[1];

      // Connect every point of Hand 1 to every point of Hand 2
      for (let i = 0; i < hand1.length; i++) {
        let p1 = { x: hand1[i].x * width, y: hand1[i].y * height };
        
        for (let j = 0; j < hand2.length; j++) {
          let p2 = { x: hand2[j].x * width, y: hand2[j].y * height };
          
          let d = dist(p1.x, p1.y, p2.x, p2.y);
          
          // "Rubber Band" Logic:
          // Blue (240) when hands are close (~100px)
          // Red (0) when hands are far (~800px)
          let hueValue = map(d, 100, 800, 240, 0, true);
          
          stroke(hueValue, 90, 100, 0.4);
          strokeWeight(1);
          line(p1.x, p1.y, p2.x, p2.y);
        }
      }
    }

    // Draw the joints for all visible hands
    if (handData) {
      for (let hand of handData) {
        for (let lm of hand) {
          fill(255);
          noStroke();
          ellipse(lm.x * width, lm.y * height, 4, 4);
        }
      }
    }
    
    pop(); 
  }

  function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
  }
</script>
</body>
</html>
